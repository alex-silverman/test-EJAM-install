name: R

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
        r-version: [4.4]
        install-method: ["remotes::install_github"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
          
      - name: Install devtools
        run: |
          R -e 'install.packages("remotes")'
  
      - name: Install Package - ${{ matrix.install-method }}
        run: |
          R -e 'remotes::install_url("https://github.com/USEPA/EJAM-open/archive/refs/tags/v2.32-EJAM-open.tar.gz", dependencies=TRUE, auth_token=NULL)'
          
      - name: Test Installation
        run: |
          R -e 'library(EJAM); print("Package loaded successfully")'
